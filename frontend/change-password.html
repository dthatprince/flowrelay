<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Change Password - Flow Relay</title>

  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link id="pagestyle" href="./assets/css/soft-ui-dashboard.min.css?v=1.0.7" rel="stylesheet" />

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    .toast-notification {
      position: fixed; top: 20px; right: 20px; padding: 15px 20px;
      border-radius: 10px; color: white; font-weight: 600; z-index: 9999;
      opacity: 0; transform: translateX(100%); transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .toast-notification.show { opacity: 1; transform: translateX(0); }
    .toast-success { background: linear-gradient(310deg, #17ad37 0%, #98ec2d 100%); }
    .toast-error   { background: linear-gradient(310deg, #ea0606 0%, #ff667c 100%); }
    .toast-content { display: flex; align-items: center; gap: 10px; }

    .password-strength { height: 4px; border-radius: 4px; margin-top: 6px; transition: all 0.3s; }
    .strength-weak   { background: #ea0606; width: 33%; }
    .strength-medium { background: #fb8c00; width: 66%; }
    .strength-strong { background: #17ad37; width: 100%; }

    .security-tip {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: #0369a1;
      margin-bottom: 20px;
    }
  </style>
</head>

<body class="g-sidenav-show bg-gray-100">

  <!-- Sidebar is injected dynamically based on role -->
  <aside class="sidenav navbar navbar-vertical navbar-expand-xs border-0 border-radius-xl my-3 fixed-start ms-3" id="sidebar">
    <div class="sidenav-header">
      <a class="navbar-brand m-0" href="#" id="sidebarBrand">
        <span class="ms-1 font-weight-bold">Flow Relay</span>
      </a>
    </div>
    <hr class="horizontal dark mt-0">
    <div class="collapse navbar-collapse w-auto" id="sidenav-collapse-main">
      <ul class="navbar-nav" id="sidebarNav">
        <!-- Filled by JS based on role -->
      </ul>
    </div>
  </aside>

  <main class="main-content position-relative max-height-vh-100 h-100 border-radius-lg">
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-4 shadow-none border-radius-xl" id="navbarBlur">
      <div class="container-fluid py-1 px-3">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
            <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="#" id="dashboardLink">Dashboard</a></li>
            <li class="breadcrumb-item text-sm text-dark active">Change Password</li>
          </ol>
          <h6 class="font-weight-bolder mb-0">Change Password</h6>
        </nav>
        <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
          <div class="ms-md-auto pe-md-3"></div>
          <ul class="navbar-nav justify-content-end">
            <li class="nav-item d-flex align-items-center">
              <a href="#" class="nav-link text-body font-weight-bold px-0">
                <i class="fa fa-user me-sm-1"></i>
                <span class="d-sm-inline d-none user-name">User</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid py-4">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card">
            <div class="card-header pb-0">
              <h6><i class="fas fa-lock me-2"></i>Change Your Password</h6>
            </div>
            <div class="card-body">

              <div class="security-tip">
                <i class="fas fa-shield-alt me-2"></i>
                <strong>Security tip:</strong> Use a unique password with at least 8 characters,
                including numbers and special characters.
              </div>

              <form id="changePasswordForm">
                <div class="mb-3">
                  <label class="form-control-label">Current Password</label>
                  <input type="password" class="form-control" id="currentPassword"
                    placeholder="Enter your current password"
                    autocomplete="current-password" required>
                </div>

                <div class="mb-3">
                  <label class="form-control-label">New Password</label>
                  <input type="password" class="form-control" id="newPassword"
                    placeholder="Enter a new password"
                    autocomplete="new-password" required minlength="6">
                  <div class="password-strength" id="strengthBar" style="display:none;"></div>
                  <small class="text-muted" id="strengthLabel"></small>
                </div>

                <div class="mb-4">
                  <label class="form-control-label">Confirm New Password</label>
                  <input type="password" class="form-control" id="confirmPassword"
                    placeholder="Repeat your new password"
                    autocomplete="new-password" required>
                </div>

                <div class="d-flex gap-2">
                  <button type="submit" class="btn bg-gradient-primary" id="submitBtn">
                    <i class="fas fa-save me-2"></i>Update Password
                  </button>
                  <a href="#" class="btn btn-outline-secondary" id="cancelBtn">Cancel</a>
                </div>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./assets/js/core/popper.min.js"></script>
  <script src="./assets/js/core/bootstrap.min.js"></script>
  <script src="./assets/js/plugins/perfect-scrollbar.min.js"></script>
  <script src="./assets/js/plugins/smooth-scrollbar.min.js"></script>
  <script src="./assets/js/soft-ui-dashboard.min.js?v=1.0.7"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/utils.js"></script>

  <script>
    // ── Role-specific sidebar nav ────────────────────────────────────────────
    const NAV = {
      admin: {
        brand: 'Admin Panel',
        dashboard: './admin/dashboard.html',
        links: [
          { href: './admin/dashboard.html',   icon: 'fa-home text-primary',        label: 'Dashboard' },
          { href: './admin/approvals.html',    icon: 'fa-user-check text-warning',  label: 'Account Approvals' },
          { href: './admin/users.html',        icon: 'fa-users text-info',          label: 'Manage Users' },
          { href: './admin/drivers.html',      icon: 'fa-car text-success',         label: 'Manage Drivers' },
          { href: './admin/offers.html',       icon: 'fa-truck text-warning',       label: 'Manage Offers' },
          { href: './admin/reports.html',      icon: 'fa-chart-bar text-danger',    label: 'Reports' },
        ]
      },
      client: {
        brand: 'Flow Relay',
        dashboard: './client/dashboard.html',
        links: [
          { href: './client/dashboard.html',  icon: 'fa-home text-primary',   label: 'Dashboard' },
          { href: './client/offers.html',     icon: 'fa-list text-warning',   label: 'My Offers' },
          { href: './client/create-offer.html', icon: 'fa-plus text-success', label: 'Create Offer' },
        ]
      },
      driver: {
        brand: 'Driver Portal',
        dashboard: './driver/dashboard.html',
        links: [
          { href: './driver/dashboard.html',         icon: 'fa-home text-primary',    label: 'Dashboard' },
          { href: './driver/profile.html',           icon: 'fa-user text-info',       label: 'My Profile' },
          { href: './driver/available-offers.html',  icon: 'fa-search text-warning',  label: 'Available Offers' },
          { href: './driver/my-deliveries.html',     icon: 'fa-truck text-success',   label: 'My Deliveries' },
          { href: './driver/history.html',           icon: 'fa-history text-secondary', label: 'History' },
        ]
      }
    };

    async function initPage() {
      // ✅ Restore session
      const user = await auth.restoreSession();
      if (!user) { window.location.href = './index.html'; return; }
      auth.initUserDisplay();

      // Build sidebar based on role
      const nav = NAV[user.role] || NAV.client;
      document.getElementById('sidebarBrand').querySelector('span').textContent = nav.brand;
      document.getElementById('dashboardLink').href = nav.dashboard;
      document.getElementById('cancelBtn').href = nav.dashboard;

      const navEl = document.getElementById('sidebarNav');
      navEl.innerHTML = nav.links.map(l => `
        <li class="nav-item">
          <a class="nav-link" href="${l.href}">
            <div class="icon icon-shape icon-sm shadow border-radius-md bg-white text-center me-2 d-flex align-items-center justify-content-center">
              <i class="fas ${l.icon}"></i>
            </div>
            <span class="nav-link-text ms-1">${l.label}</span>
          </a>
        </li>
      `).join('') + `
        <li class="nav-item mt-3">
          <h6 class="ps-4 ms-2 text-uppercase text-xs font-weight-bolder opacity-6">Account</h6>
        </li>
        <li class="nav-item">
          <a class="nav-link logout-btn" href="#">
            <div class="icon icon-shape icon-sm shadow border-radius-md bg-white text-center me-2 d-flex align-items-center justify-content-center">
              <i class="fas fa-sign-out-alt text-danger"></i>
            </div>
            <span class="nav-link-text ms-1">Logout</span>
          </a>
        </li>
      `;

      // Re-bind logout (auth.js DOMContentLoaded already ran, so bind manually)
      document.querySelectorAll('.logout-btn').forEach(btn => {
        btn.addEventListener('click', e => { e.preventDefault(); auth.logout(); });
      });
    }

    // ── Password strength meter ──────────────────────────────────────────────
    document.getElementById('newPassword').addEventListener('input', function () {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');

      if (!val) { bar.style.display = 'none'; label.textContent = ''; return; }
      bar.style.display = 'block';

      if (val.length < 6) {
        bar.className = 'password-strength strength-weak';
        label.textContent = 'Too short';
      } else if (val.length < 10 || !/[^a-zA-Z0-9]/.test(val)) {
        bar.className = 'password-strength strength-medium';
        label.textContent = 'Medium strength';
      } else {
        bar.className = 'password-strength strength-strong';
        label.textContent = 'Strong password';
      }
    });

    // ── Form submit ──────────────────────────────────────────────────────────
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 6) {
        showToast('New password must be at least 6 characters', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }

      showLoading('submitBtn');

      try {
        await api.request('/change-password', {
          method: 'POST',
          body: JSON.stringify({ current_password: currentPassword, new_password: newPassword }),
        });

        showToast('Password updated successfully!', 'success');
        document.getElementById('changePasswordForm').reset();
        document.getElementById('strengthBar').style.display = 'none';
        document.getElementById('strengthLabel').textContent = '';
        hideLoading('submitBtn', '<i class="fas fa-save me-2"></i>Update Password');

      } catch (error) {
        hideLoading('submitBtn', '<i class="fas fa-save me-2"></i>Update Password');
        showToast(error.message || 'Failed to update password. Please try again.', 'error');
      }
    });

    initPage();
  </script>
</body>
</html>
